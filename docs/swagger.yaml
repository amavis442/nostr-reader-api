        name: cursor
        type: integer
      - description: Pagination direction
        enum:
        - next
        - prev
        in: query
        name: direction
        type: string
      - default: 10
        description: Results per page
        in: query
        name: per_page
        type: integer
      - default: false
        description: Force refresh ignoring cache
        in: query
