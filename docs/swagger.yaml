definitions:
  db.Profile:
    properties:
      about:
        type: string
      blocked:
        type: boolean
      display_name:
        type: string
      followed:
        type: boolean
      lud16:
        type: string
      name:
        type: string
      nip05:
        type: string
      picture:
        type: string
      pubkey:
        type: string
      uid:
        type: string
      urls:
        items:
          type: string
        type: array
      website:
        type: string
    type: object
  db.Relay:
    properties:
      read:
        type: boolean
      search:
        type: boolean
      url:
        type: string
      write:
        type: boolean
    type: object
  http.BookMark:
    properties:
      event_id:
        type: string
    type: object
  http.Msg:
    properties:
      event_id:
        description: If it is a reply
        type: string
      msg:
        type: string
    type: object
  http.PageRequest:
    properties:
      context:
        type: string
      cursor:
        type: integer
      direction:
        type: string
      per_page:
        type: integer
      renew:
        type: boolean
      since:
        type: integer
    type: object
  http.Pubkey:
    properties:
      pubkey:
        type: string
    type: object
  http.Response:
    description: Standard response to return to client
    properties:
      context:
        type: string
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
info:
  contact: {}
