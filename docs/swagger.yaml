      - description: Start id
        in: query
        name: start_id
        required: true
        type: integer
      - description: End id
        in: query
        name: end_id
        required: true
        type: integer
      - default: 10
        description: Results per page
        in: query
        name: per_page
        type: integer
      - default: false
        description: Renew page and ignore start_id
        in: query
        name: renew
        type: boolean
      - description: Since
